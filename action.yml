name: 'Release Sync'
description: 'A lightweight and reliable GitHub Action to synchronize release assets between GitHub Release and Gitee Release.'
author: 'YuZhiYuanOrg'
branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:
  sync-platforms:
    description: 'Platforms to sync releases to (comma-separated: github, gitee)'
    required: true
    default: 'github,gitee'
  tag:
    description: 'Release tag name (e.g., v1.0.0)'
    required: true
    default: ${{ github.ref_name }}
  release-name:
    description: 'Release name'
    required: true
    default: ${{ github.ref_name }}
  release-body:
    description: 'Release description content'
    required: false
    default: 'Auto release by GitHub Action'
  draft:
    description: 'Is it a draft release?'
    required: false
    default: 'false'
  prerelease:
    description: 'Is it a pre-release version?'
    required: false
    default: 'false'
  github-token:
    description: 'GitHub personal access token'
    required: false
    default: ${{ github.token }}
  gitee-token:
    description: 'Gitee personal access token (requires repo permission)'
    required: false
  gitee-owner:
    description: 'Gitee repository owner (username/organization name)'
    required: false
  gitee-repo:
    description: 'Gitee repository name'
    required: false
  asset-files:
    description: 'Path to files to upload (supports wildcards, e.g., dist/*)'
    required: false

runs:
  using: 'node20'
  main: 'dist/index.js'
